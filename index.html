<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Quiniela 2026</title>
  <style>
    /* Estilos base con modo oscuro moderno */
    :root {
      --bg-dark: #060B18;
      --bg-panel: #0E2340;
      --bg-accent: #123056;
      --text-main: #F3F6FA;
      --text-muted: #8FA3C0;
      --green: #00B36B;
      --blue: #2F80ED;
      --gold: #FFD166;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      background-color: var(--bg-panel);
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
      color: var(--gold);
    }

    .container {
      width: 90%;
      max-width: 1000px;
      margin: 20px 0;
    }

    /* Estado de Carga */
    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 50px;
    }

    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border-left-color: var(--blue);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Tabs de Torneos */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-btn {
      background-color: var(--bg-panel);
      color: var(--text-muted);
      border: 2px solid var(--bg-accent);
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }

    .tab-btn.active {
      background-color: var(--blue);
      color: var(--text-main);
      border-color: var(--blue);
    }

    /* Contenedor de Partidos */
    .matches-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
    }

    .match-card {
      background-color: var(--bg-panel);
      border-radius: 8px;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 5px solid var(--bg-accent);
    }

    .match-info {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .teams-container {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 1.1rem;
      font-weight: 500;
    }

    .score {
      background-color: var(--bg-dark);
      padding: 5px 10px;
      border-radius: 4px;
      color: var(--gold);
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <h1>🏆 MI QUINIELA MULTI-TORNEO 2026</h1>
  </header>

  <div class="container">
    <div class="tabs" id="tournament-tabs">
      <button class="tab-btn active" onclick="switchTournament('worldcup')">Mundial 2026</button>
      <button class="tab-btn" onclick="switchTournament('liganacional')">Liga Nacional GT</button>
      <button class="tab-btn" onclick="switchTournament('libertadores')">Copa Libertadores</button>
    </div>

    <div id="loading-screen">
      <div class="spinner"></div>
      <p style="color: var(--text-muted); margin-top: 15px;">Cargando partidos desde el servidor...</p>
    </div>

    <div class="matches-list" id="matches-container" style="display: none;"></div>
  </div>

  <script>
    // Estado global de nuestra aplicación simplificada
    const state = {
      currentTournament: 'worldcup',
      allMatches: []
    };

    // Auxiliar: Convertir número serial de Excel a Fecha (AAAA-MM-DD)
    function excelSerialToDate(serial) {
      const s = parseFloat(serial);
      if (isNaN(s) || s <= 0) return '';
      const excelEpoch = new Date(1899, 11, 30);
      const date = new Date(excelEpoch.getTime() + s * 24 * 60 * 60 * 1000);
      if (isNaN(date.getTime())) return '';
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    // Auxiliar: Convertir decimal de Excel a Hora (HH:MM)
    function excelSerialToTime(serial) {
      const s = parseFloat(serial);
      if (isNaN(s)) return '';
      const decimalPart = s % 1;
      if (decimalPart === 0) return '00:00';
      const totalSeconds = Math.round(decimalPart * 24 * 60 * 60);
      return `${String(Math.floor(totalSeconds / 3600)).padStart(2, '0')}:${String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0')}`;
    }

    // Cargar y procesar el CSV de forma ultra-segura
    async function loadMatchesFromCSV() {
      try {
        // Buscamos dinámicamente el archivo 'partidos.csv' en la raíz de tu GitHub Pages
        const csvUrl = window.location.origin + window.location.pathname.replace('index.html', '') + 'partidos.csv';
        const response = await fetch(csvUrl);
        
        if (!response.ok) throw new Error("No se encontró partidos.csv en el repositorio");

        // Decodificar explícitamente en Windows-1252 (Latin-1) para salvar tildes y eñes
        const arrayBuffer = await response.arrayBuffer();
        const decoder = new TextDecoder('windows-1252');
        const csvText = decoder.decode(arrayBuffer);

        const lines = csvText.split(/\r?\n/);
        const processedMatches = [];

        // Procesamos línea por línea (saltando cabecera i=0)
        for (let i = 1; i < lines.length; i++) {
          if (!lines[i].trim()) continue;

          try {
            const row = lines[i].split(',');
            if (row.length < 4) continue; // Ignorar líneas incompletas

            let rawDate = (row[10] || '').trim();
            let rawTime = (row[11] || '').trim();
            
            // Validar/Convertir Fecha de Excel o Estándar
            if (rawDate && !isNaN(rawDate) && !rawDate.includes('/') && !rawDate.includes('-')) {
              rawDate = excelSerialToDate(rawDate);
            } else if (rawDate.includes('/')) {
              const p = rawDate.split('/');
              if (p.length === 3) rawDate = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
            }

            // Validar/Convertir Hora de Excel o Estándar
            if (rawTime && !isNaN(rawTime) && !rawTime.includes(':')) {
              rawTime = excelSerialToTime(rawTime);
            } else if (rawTime.includes(':')) {
              const t = rawTime.split(':');
              if (t.length >= 2) rawTime = `${t[0].padStart(2,'0')}:${t[1].padStart(2,'0')}`;
            }

            processedMatches.push({
              tournament: row[0].trim(),
              name_esp: row[1] || '',
              id: row[3] || ('id_' + i),
              round: row[4] || '',
              group: row[5] || '',
              home: row[7] || 'Por definir',
              away: row[8] || 'Por definir',
              venue: row[9] || '',
              date: rawDate || 'Por definir',
              time: rawTime || 'Por confirmar',
              status: row[12] || 'pending',
              reg_home: row[13] !== "" && row[13] !== undefined && !isNaN(row[13]) ? parseInt(row[13]) : '-',
              reg_away: row[14] !== "" && row[14] !== undefined && !isNaN(row[14]) ? parseInt(row[14]) : '-'
            });

          } catch (rowErr) {
            console.error(`Error en fila ${i}:`, rowErr);
          }
        }

        state.allMatches = processedMatches;
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('matches-container').style.display = 'grid';
        renderMatches();

      } catch (err) {
        console.error("Error crítico cargando la base de datos:", err);
        document.getElementById('loading-screen').innerHTML = `<p style="color:var(--red)">⚠️ Error al conectar con la base de datos (partidos.csv).</p>`;
      }
    }

    // Dibujar los partidos del torneo seleccionado en pantalla
    function renderMatches() {
      const container = document.getElementById('matches-container');
      container.innerHTML = '';

      const filtered = state.allMatches.filter(m => m.tournament === state.currentTournament);

      if (filtered.length === 0) {
        container.innerHTML = `<p style="color: var(--text-muted); text-align:center;">No hay partidos registrados para este torneo todavía.</p>`;
        return;
      }

      filtered.forEach(match => {
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
          <div>
            <div class="match-info">${match.round.toUpperCase()} ${match.group ? '• ' + match.group : ''}</div>
            <div class="teams-container">
              <span>${match.home}</span>
              <span class="score">${match.reg_home}</span>
              <span>vs</span>
              <span class="score">${match.reg_away}</span>
              <span>${match.away}</span>
            </div>
            <div class="match-info" style="margin-top: 5px;">📅 ${match.date}  🕒 ${match.time} ${match.venue ? '📍 ' + match.venue : ''}</div>
          </div>
          <div style="font-weight: bold; font-size: 0.85rem; color: ${match.status === 'finished' ? 'var(--green)' : 'var(--blue)'}">
            ${match.status === 'finished' ? '● FINALIZADO' : '○ PENDIENTE'}
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Cambiar de pestaña de torneo
    function switchTournament(tournamentId) {
      state.currentTournament = tournamentId;
      
      // Actualizar estados visuales de los botones
      const buttons = document.querySelectorAll('.tab-btn');
      buttons.forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      renderMatches();
    }

    // Inicializar la aplicación al cargar el DOM
    window.addEventListener('DOMContentLoaded', loadMatchesFromCSV);
  </script>
</body>
</html>
