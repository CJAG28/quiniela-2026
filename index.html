<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Graduate&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #14532d, #052e16);
        }
        .font-scoreboard {
            font-family: 'Graduate', monospace;
        }
        /* Estilo césped */
        .pitch-bg {
            background-color: #15803d;
            background-image: linear-gradient(rgba(255,255,255,0.1) 2px, transparent 2px),
                              linear-gradient(90deg, rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="min-h-screen text-white p-4 sm:p-6" id="app">

    <header class="max-w-5xl mx-auto flex justify-between items-center mb-6 border-b border-green-600 pb-4">
        <div>
            <h1 class="text-3xl sm:text-4xl font-extrabold uppercase tracking-wider font-scoreboard text-yellow-400 drop-shadow-md">
                <span data-lang="es">QUINIELA 2026</span>
                <span data-lang="en" class="hidden">2026 PREDICTOR</span>
            </h1>
            <p class="text-green-300 text-sm">
                <span data-lang="es">¡Pronostica, comparte y compite en tiempo real!</span>
                <span data-lang="en" class="hidden">Predict, share, and compete in real-time!</span>
            </p>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleLang()" class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-1 px-3 rounded text-sm transition">
                🌐 <span id="lang-btn-text">EN</span>
            </button>
            <button onclick="toggleAdmin()" class="bg-zinc-700 hover:bg-zinc-600 text-white font-bold py-1 px-3 rounded text-sm transition">
                ⚙️ Admin
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 space-y-6">
            
            <section id="admin-panel" class="hidden bg-zinc-900 border-2 border-red-500 rounded-xl p-4 shadow-xl">
                <h2 class="text-xl font-bold text-red-400 mb-3 uppercase font-scoreboard">
                    Control de Admin (Resultados Reales)
                </h2>
                <div id="admin-matches" class="space-y-4">
                    </div>
                <button onclick="saveRealResults()" class="mt-4 w-full bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-4 rounded transition uppercase tracking-wider">
                    <span data-lang="es">Guardar Resultados Oficiales</span>
                    <span data-lang="en" class="hidden">Save Official Results</span>
                </button>
            </section>

            <section class="pitch-bg border-4 border-white rounded-2xl p-4 sm:p-6 shadow-2xl relative overflow-hidden">
                <div class="absolute inset-0 border-2 border-dashed border-white/20 pointer-events-none m-4"></div>
                
                <div class="relative z-10">
                    <h2 class="text-2xl font-black mb-4 uppercase tracking-wide font-scoreboard text-center bg-black/40 py-2 rounded">
                        <span data-lang="es">TUS PRONÓSTICOS</span>
                        <span data-lang="en" class="hidden">YOUR PREDICTIONS</span>
                    </h2>

                    <div class="mb-6 bg-black/50 p-4 rounded-xl border border-green-500">
                        <label class="block text-sm font-bold text-yellow-400 mb-2 uppercase">
                            <span data-lang="es">Tu Nombre / Apodo:</span>
                            <span data-lang="en" class="hidden">Your Name / Nickname:</span>
                        </label>
                        <input type="text" id="player-name" class="w-full bg-zinc-800 text-white border-2 border-green-400 rounded p-2 text-lg font-bold focus:outline-none focus:border-yellow-400" placeholder="Ej. Carlos_10">
                    </div>

                    <div id="matches-container" class="space-y-4">
                        </div>

                    <button onclick="submitPredictions()" class="mt-6 w-full bg-yellow-400 hover:bg-yellow-300 text-black font-black text-xl py-4 px-6 rounded-xl shadow-lg transform active:scale-95 transition uppercase tracking-wider font-scoreboard">
                        <span data-lang="es">⚽ ENVIAR PRONÓSTICOS ⚽</span>
                        <span data-lang="en" class="hidden">⚽ SUBMIT PREDICTIONS ⚽</span>
                    </button>
                </div>
            </section>
        </div>

        <div class="lg:col-span-1">
            <section class="bg-black/40 backdrop-blur-md border-2 border-yellow-500 rounded-2xl p-4 shadow-xl">
                <h2 class="text-2xl font-black mb-4 uppercase tracking-wide font-scoreboard text-center text-yellow-400">
                    <span data-lang="es">TABLA EN VIVO</span>
                    <span data-lang="en" class="hidden">LIVE LEAGUE TABLE</span>
                </h2>
                
                <div class="text-xs bg-zinc-800/80 p-2 rounded mb-4 border border-zinc-700 flex justify-around">
                    <span>🟢 <b>M. Exacto:</b> 5pts</span>
                    <span>🟡 <b>Ganador:</b> 3pts</span>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b-2 border-zinc-700 text-yellow-400 text-sm uppercase font-scoreboard">
                                <th class="py-2 px-1 text-center">Pos</th>
                                <th class="py-2 px-2"><span data-lang="es">Jugador</span><span data-lang="en" class="hidden">Player</span></th>
                                <th class="py-2 px-1 text-center">Pts</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body" class="divide-y divide-zinc-800 font-medium">
                            </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 bg-yellow-400 text-black font-bold px-6 py-3 rounded-xl shadow-2xl transition-opacity duration-300 opacity-0 pointer-events-none z-50"></div>

    <script>
        // CONFIGURACIÓN INICIAL DE PARTIDOS (Fácilmente ampliable)
        const DEFAULT_MATCHES = [
            { id: 1, home: "México 🇲🇽", away: "Sudáfrica 🇿🇦" },
            { id: 2, home: "USA 🇺🇸", away: "Paraguay 🇵🇾" },
            { id: 3, home: "Guatemala 🇬🇹", away: "Australia 🇦🇺" },
            { id: 4, home: "Argentina 🇦🇷", away: "Argelia 🇩🇿" }
        ];

        let currentLang = 'es';
        let state = {
            predictions: {}, // { playerName: { matchId: { type: 'exact'|'winner', homeScore, awayScore, winnerChoice } } }
            results: {}      // { matchId: { homeScore, awayScore, completed: true/false } }
        };

        // Inicializar almacenamiento compartido en red real-time
        const storage = (typeof window.storage !== 'undefined') 
            ? window.storage.shared 
            : {
                // Fallback local por si se corre fuera del entorno compatible
                getItem: (key) => localStorage.getItem(key),
                setItem: (key, val) => { localStorage.setItem(key, val); if(window.onStorageUpdate) window.onStorageUpdate(); }
              };

        async function init() {
            // Cargar datos guardados del almacenamiento compartido
            try {
                const savedPredictions = await storage.getItem('quiniela_predictions');
                const savedResults = await storage.getItem('quiniela_results');
                
                if (savedPredictions) state.predictions = JSON.parse(savedPredictions);
                if (savedResults) state.results = JSON.parse(savedResults);
            } catch (e) {
                console.log("Error cargando desde window.storage:", e);
            }

            renderMatches();
            renderAdminMatches();
            calculateLeaderboard();
        }

        // Cambiar idioma (ES / EN)
        function toggleLang() {
            currentLang = currentLang === 'es' ? 'en' : 'es';
            document.getElementById('lang-btn-text').innerText = currentLang === 'es' ? 'EN' : 'ES';
            document.querySelectorAll('[data-lang]').forEach(el => {
                if (el.dataset.lang === currentLang) {
                    el.classList.remove('hidden');
                } else {
                    el.classList.add('hidden');
                }
            });
        }

        // Mostrar / Ocultar panel admin
        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.classList.toggle('hidden');
        }

        // Renderizar partidos en la zona del jugador
        function renderMatches() {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';

            DEFAULT_MATCHES.forEach(match => {
                const res = state.results[match.id] || { completed: false };
                const resText = res.completed ? ` (Real: ${res.homeScore} - ${res.awayScore})` : '';

                const html = `
                    <div class="bg-black/60 rounded-xl p-4 border border-white/20 shadow-inner">
                        <div class="flex justify-between items-center mb-3 border-b border-zinc-700/50 pb-1">
                            <span class="text-xs font-bold text-yellow-400 uppercase tracking-widest font-scoreboard">PARTIDO ${match.id} ${resText}</span>
                        </div>
                        
                        <div class="grid grid-cols-3 items-center text-center font-bold text-lg mb-4">
                            <div class="text-right pr-2">${match.home}</div>
                            <div class="text-yellow-400 font-scoreboard text-2xl font-black">VS</div>
                            <div class="text-left pl-2">${match.away}</div>
                        </div>

                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <label class="flex items-center justify-center p-2 bg-zinc-800 rounded cursor-pointer border border-transparent has-[:checked]:border-yellow-400">
                                <input type="radio" name="mode-${match.id}" value="winner" checked class="sr-only" onchange="toggleMatchInputs(${match.id}, 'winner')">
                                <span class="text-xs uppercase font-bold text-zinc-300">
                                    <span data-lang="es">Ganador Directo</span><span data-lang="en" class="hidden">Straight Winner</span>
                                </span>
                            </label>
                            <label class="flex items-center justify-center p-2 bg-zinc-800 rounded cursor-pointer border border-transparent has-[:checked]:border-yellow-400">
                                <input type="radio" name="mode-${match.id}" value="exact" class="sr-only" onchange="toggleMatchInputs(${match.id}, 'exact')">
                                <span class="text-xs uppercase font-bold text-zinc-300">
                                    <span data-lang="es">Marcador Exacto</span><span data-lang="en" class="hidden">Exact Score</span>
                                </span>
                            </label>
                        </div>

                        <div id="winner-inputs-${match.id}" class="grid grid-cols-3 gap-2 text-sm font-bold">
                            <button type="button" onclick="setWinnerChoice(${match.id}, 'home')" id="btn-win-home-${match.id}" class="choice-btn py-2 bg-zinc-700 hover:bg-zinc-600 rounded text-center transition">Local</button>
                            <button type="button" onclick="setWinnerChoice(${match.id}, 'draw')" id="btn-win-draw-${match.id}" class="choice-btn py-2 bg-zinc-700 hover:bg-zinc-600 rounded text-center transition">Empate</button>
                            <button type="button" onclick="setWinnerChoice(${match.id}, 'away')" id="btn-win-away-${match.id}" class="choice-btn py-2 bg-zinc-700 hover:bg-zinc-600 rounded text-center transition">Visita</button>
                            <input type="hidden" id="winner-choice-${match.id}" value="">
                        </div>

                        <div id="exact-inputs-${match.id}" class="hidden flex justify-center items-center gap-4">
                            <input type="number" min="0" id="exact-home-${match.id}" class="w-16 bg-zinc-900 border-2 border-zinc-700 rounded p-2 text-center text-xl font-scoreboard text-yellow-400" placeholder="0">
                            <span class="font-bold text-xl">-</span>
                            <input type="number" min="0" id="exact-away-${match.id}" class="w-16 bg-zinc-900 border-2 border-zinc-700 rounded p-2 text-center text-xl font-scoreboard text-yellow-400" placeholder="0">
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
            // Sincronizar visibilidad de idiomas en los elementos recién creados
            toggleLang(); toggleLang(); 
        }

        function toggleMatchInputs(matchId, mode) {
            if (mode === 'winner') {
                document.getElementById(`winner-inputs-${matchId}`).classList.remove('hidden');
                document.getElementById(`exact-inputs-${matchId}`).classList.add('hidden');
            } else {
                document.getElementById(`winner-inputs-${matchId}`).classList.add('hidden');
                document.getElementById(`exact-inputs-${matchId}`).classList.remove('hidden');
            }
        }

        function setWinnerChoice(matchId, choice) {
            // Resetear estilos de botones en este partido
            document.querySelectorAll(`#winner-inputs-${matchId} .choice-btn`).forEach(btn => {
                btn.classList.remove('bg-yellow-400', 'text-black', 'bg-zinc-700');
                btn.classList.add('bg-zinc-700');
            });
            // Activar elegido
            const selectedBtn = document.getElementById(`btn-win-${choice}-${matchId}`);
            selectedBtn.classList.remove('bg-zinc-700');
            selectedBtn.classList.add('bg-yellow-400', 'text-black');
            
            document.getElementById(`winner-choice-${matchId}`).value = choice;
        }

        // Enviar pronósticos del usuario al almacenamiento compartido
        async function submitPredictions() {
            const nameInput = document.getElementById('player-name').value.trim();
            if (!nameInput) {
                showToast(currentLang === 'es' ? "⚠️ Ingresa tu nombre por favor" : "⚠️ Please enter your name");
                return;
            }

            let playerPredictions = {};

            for (let match of DEFAULT_MATCHES) {
                const mode = document.querySelector(`input[name="mode-${match.id}"]:checked`).value;
                if (mode === 'winner') {
                    const choice = document.getElementById(`winner-choice-${match.id}`).value;
                    if (!choice) {
                        showToast(currentLang === 'es' ? `⚠️ Elige ganador para el partido ${match.id}` : `⚠️ Select a winner for match ${match.id}`);
                        return;
                    }
                    playerPredictions[match.id] = { type: 'winner', choice };
                } else {
                    const homeS = document.getElementById(`exact-home-${match.id}`).value;
                    const awayS = document.getElementById(`exact-away-${match.id}`).value;
                    if (homeS === '' || awayS === '') {
                        showToast(currentLang === 'es' ? `⚠️ Pon marcador completo para el partido ${match.id}` : `⚠️ Fill full score for match ${match.id}`);
                        return;
                    }
                    playerPredictions[match.id] = { type: 'exact', homeScore: parseInt(homeS), awayScore: parseInt(awayS) };
                }
            }

            state.predictions[nameInput] = playerPredictions;
            await storage.setItem('quiniela_predictions', JSON.stringify(state.predictions));
            
            showToast(currentLang === 'es' ? "🎉 ¡Pronósticos guardados con éxito!" : "🎉 Predictions submitted successfully!");
            calculateLeaderboard();
        }

        // Renderizar controles de Admin
        function renderAdminMatches() {
            const container = document.getElementById('admin-matches');
            container.innerHTML = '';

            DEFAULT_MATCHES.forEach(match => {
                const current = state.results[match.id] || { homeScore: '', awayScore: '', completed: false };
                const html = `
                    <div class="flex items-center justify-between bg-zinc-800 p-2 rounded border border-zinc-700 text-sm">
                        <span class="w-1/3 font-bold">${match.home} vs ${match.away}</span>
                        <div class="flex items-center gap-2 w-2/3 justify-end">
                            <input type="number" id="admin-home-${match.id}" value="${current.homeScore}" class="w-12 bg-black p-1 text-center font-bold text-yellow-400" placeholder="L">
                            <span>-</span>
                            <input type="number" id="admin-away-${match.id}" value="${current.awayScore}" class="w-12 bg-black p-1 text-center font-bold text-yellow-400" placeholder="V">
                            <label class="flex items-center gap-1 ml-2 text-xs">
                                <input type="checkbox" id="admin-check-${match.id}" ${current.completed ? 'checked' : ''}> Jugar / Final
                            </label>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // Guardar resultados reales (Admin)
        async function saveRealResults() {
            DEFAULT_MATCHES.forEach(match => {
                const homeVal = document.getElementById(`admin-home-${match.id}`).value;
                const awayVal = document.getElementById(`admin-away-${match.id}`).value;
                const isChecked = document.getElementById(`admin-check-${match.id}`).checked;

                if (isChecked && homeVal !== '' && awayVal !== '') {
                    state.results[match.id] = {
                        homeScore: parseInt(homeVal),
                        awayScore: parseInt(awayVal),
                        completed: true
                    };
                } else {
                    state.results[match.id] = { completed: false };
                }
            });

            await storage.setItem('quiniela_results', JSON.stringify(state.results));
            showToast("📈 Resultados oficiales actualizados");
            renderMatches();
            calculateLeaderboard();
        }

        // Calcular tabla de posiciones cruzando pronósticos vs resultados reales
        function calculateLeaderboard() {
            let scores = {}; // { playerName: totalPoints }

            // Asegurar que todos los jugadores registrados aparezcan
            Object.keys(state.predictions).forEach(player => {
                scores[player] = 0;
                const pPredictions = state.predictions[player];

                Object.keys(pPredictions).forEach(matchId => {
                    const real = state.results[matchId];
                    if (!real || !real.completed) return; // Si no hay resultado real definitivo, no puntúa aún.

                    const pred = pPredictions[matchId];
                    
                    // Determinar resultado real real (home, away, o draw)
                    let realResult = 'draw';
                    if (real.homeScore > real.awayScore) realResult = 'home';
                    if (real.homeScore < real.awayScore) realResult = 'away';

                    if (pred.type === 'winner') {
                        // Acierto de ganador simple = 3 Puntos
                        if (pred.choice === realResult) {
                            scores[player] += 3;
                        }
                    } else if (pred.type === 'exact') {
                        // Acierto de marcador exacto = 5 Puntos
                        if (pred.homeScore === real.homeScore && pred.awayScore === real.awayScore) {
                            scores[player] += 5;
                        } 
                        // Si falló marcador exacto pero acertó el ganador/empate de todas formas = 3 Puntos
                        else {
                            let predResult = 'draw';
                            if (pred.homeScore > pred.awayScore) predResult = 'home';
                            if (pred.homeScore < pred.awayScore) predResult = 'away';
                            
                            if (predResult === realResult) {
                                scores[player] += 3;
                            }
                        }
                    }
                });
            });

            // Convertir a array ordenado de mayor a menor puntaje
            let sortedList = Object.keys(scores).map(name => {
                return { name: name, points: scores[name] };
            }).sort((a, b) => b.points - a.points);

            renderLeaderboard(sortedList);
        }

        // Renderizar la tabla de posiciones en la UI
        function renderLeaderboard(list) {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="py-4 text-center text-sm text-zinc-400">Sin pronósticos aún</td></tr>`;
                return;
            }

            list.forEach((player, index) => {
                let medal = index + 1;
                if(index === 0) medal = '🥇';
                if(index === 1) medal = '🥈';
                if(index === 2) medal = '🥉';

                const row = `
                    <tr class="${index === 0 ? 'bg-yellow-400/10 font-bold' : ''} hover:bg-white/5 transition">
                        <td class="py-3 px-1 text-center font-scoreboard">${medal}</td>
                        <td class="py-3 px-2 truncate max-w-[120px] text-white">${player.name}</td>
                        <td class="py-3 px-1 text-center font-scoreboard text-yellow-400">${player.points}</td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        // Alertas visuales estéticas
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        // Escucha cambios remotos si otras instancias actualizan el window.storage compartido
        if (typeof window.storage !== 'undefined') {
            window.onStorageUpdate = () => {
                init();
            };
            // Polling de seguridad por si hay actualizaciones concurrentes
            setInterval(init, 4000);
        }

        // Lanzamiento inicial
        init();
    </script>
</body>
</html>
