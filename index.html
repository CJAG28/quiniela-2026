<style>
  :root, [data-theme="dark"]{
    --bg:#0a0c11; --bg-soft:#0d1017; --surface:#151822; --surface-2:#1b1f2b;
    --border:#262b3a; --text:#eef0f6; --text-dim:#8d94a8;

  }
  [data-theme="light"]{
    --bg:#f3f4f8; --bg-soft:#eceef4; --surface:#ffffff; --surface-2:#f5f6fa;
    --border:#e2e4ec; --text:#161821; --text-dim:#6b7180;
    --accent:#4f46e5; --accent-2:#0891b2; --accent-ink:#ffffff;
    --success:#059669; --success-bg:#e3f7ee; --danger:#dc2626; --danger-bg:#fdecec;
    --gold:#b8860b; --silver:#8a8f9a; --bronze:#a9612f;
    --shadow: 0 10px 30px rgba(20,20,40,.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'Inter',sans-serif; color:var(--text); background:var(--bg); min-height:100vh;}
  #app{max-width:680px; margin:0 auto; padding:14px 12px 60px;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif; margin:0;}
  a{color:var(--accent);}

  header.top{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:12px 14px; background:var(--surface); border:1px solid var(--border);
    border-radius:16px; box-shadow:var(--shadow); position:sticky; top:8px; z-index:40;
  }
  .brand{display:flex; align-items:center; gap:9px; min-width:0;}
  .brand svg{flex-shrink:0;}
  .brand h1{font-weight:700; font-size:17px; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .brand small{display:block; font-size:10.5px; color:var(--text-dim); margin-top:1px;}
  .top-actions{display:flex; gap:6px; flex-shrink:0; align-items:center;}
  .seg{display:flex; background:var(--surface-2); border:1px solid var(--border); border-radius:999px; padding:3px;}
  .seg button{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:10.5px; letter-spacing:.4px; background:transparent; color:var(--text-dim); border:none; border-radius:999px; padding:6px 9px; cursor:pointer;}
  .seg button.active{background:var(--accent); color:var(--accent-ink);}
  .icon-btn{background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:999px; width:32px; height:32px; font-size:14px; cursor:pointer; display:flex;align-items:center;justify-content:center;}

  /* ---------- TABS NAV ---------- */
  .tab-nav{display:flex; gap:6px; margin-top:12px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:4px; box-shadow:var(--shadow);}
  .tab-nav button{flex:1; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:12.5px; padding:10px 4px; border-radius:11px; border:none; background:transparent; color:var(--text-dim); cursor:pointer;}
  .tab-nav button.active{background:var(--accent); color:var(--accent-ink);}

  .banner{background:var(--danger-bg); color:var(--danger); border-radius:12px; padding:10px 14px; font-size:12.5px; margin-top:12px; line-height:1.5;}
  .toast{position:sticky; top:64px; z-index:39; margin-top:10px; padding:10px 14px; border-radius:10px; font-size:13px; font-weight:600; display:flex; justify-content:space-between; gap:10px;}
  .toast.ok{background:var(--success-bg); color:var(--success);}
  .toast.err{background:var(--danger-bg); color:var(--danger);}
  .toast button{background:none; border:none; color:inherit; font-weight:800; cursor:pointer;}

  .card{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:16px; margin-top:14px; box-shadow:var(--shadow);}
  .card h2{font-size:15.5px; font-weight:600; margin:0 0 10px; display:flex; align-items:center; gap:8px;}
  .card h2 .dot{width:7px;height:7px;border-radius:50%;background:var(--accent); flex-shrink:0;}
  .hint{font-size:11.5px; color:var(--text-dim); margin-top:8px; line-height:1.5;}
  input[type=text], input[type=password], input[type=file], select{
    font-family:'Inter',sans-serif; font-size:14px; padding:10px 12px; border-radius:10px;
    border:1.5px solid var(--border); background:var(--surface-2); color:var(--text); width:100%;
  }
  input:focus, select:focus{outline:none; border-color:var(--accent);}
  .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .row > *{flex:1; min-width:120px;}

  /* ---------- MATCH CARD ---------- */
  .match-card{background:var(--surface-2); border:1px solid var(--border); border-radius:14px; padding:14px; margin-top:10px;}
  .match-top{display:flex; align-items:center; justify-content:space-between; gap:6px;}

  .team img{width:32px; height:32px; object-fit:contain;}

  .btn-primary{width:100%; margin-top:12px; font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:700; padding:11px; border-radius:11px; background:var(--accent); color:var(--accent-ink); border:none; cursor:pointer;}
  .btn-primary:disabled{background:var(--surface); color:var(--text-dim); cursor:not-allowed; border:1px solid var(--border);}
  .btn-secondary{font-family:'Inter',sans-serif; font-weight:600; font-size:12px; padding:8px 12px; border-radius:9px; border:1.5px solid var(--border); background:transparent; color:var(--text); cursor:pointer;}
  .btn-secondary:hover{border-color:var(--accent); color:var(--accent);}
  .btn-danger{border-color:var(--danger); color:var(--danger);}

  /* ---------- ACCORDION ---------- */
  .accordion-item{border:1px solid var(--border); border-radius:12px; margin-top:8px; overflow:hidden;}
  .accordion-head{display:flex; align-items:center; justify-content:space-between; padding:11px 14px; background:var(--surface-2); cursor:pointer; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px;}
  .accordion-head .chev{transition:transform .15s ease; color:var(--text-dim);}
  .accordion-item.open .chev{transform:rotate(180deg);}

  .podium .spot{flex:1; max-width:130px; text-align:center; border-radius:12px 12px 0 0; padding:10px 6px; color:#1a1a1a;}
  .podium .spot .medal{font-size:22px;}
  .podium .spot .pname{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:12px; margin-top:4px; color:inherit;}
  .podium .spot .ppts{font-family:'JetBrains Mono',monospace; font-weight:800; font-size:15px; margin-top:2px;}
  .podium .p1{background:var(--gold); height:118px;}
  .podium .p2{background:var(--silver); height:96px;}
  .podium .p3{background:var(--bronze); height:78px;}

  table.board{width:100%; border-collapse:collapse; font-family:'JetBrains Mono',monospace; margin-top:8px;}
  table.board th{text-align:left; font-size:9.5px; letter-spacing:.6px; color:var(--text-dim); padding:4px 6px; border-bottom:1px solid var(--border); text-transform:uppercase;}
  table.board td{padding:8px 6px; font-size:12.5px; border-bottom:1px solid var(--border);}
  .rank-cell{font-weight:800; width:22px;}
  .pts-cell{color:var(--accent-2); font-weight:800; text-align:right;}
  .empty-note{color:var(--text-dim); font-style:italic; text-align:center; padding:14px 0; font-size:12.5px;}

  .share-row{display:flex; gap:8px; margin-top:10px;}
  .share-row button{flex:1;}

  /* ---------- ADMIN ---------- */
  .admin-gate{background:var(--surface-2); border:1.5px dashed var(--accent-2); border-radius:14px; padding:14px; margin-top:12px;}
  .admin-panel{background:var(--surface); border:1.5px dashed var(--accent-2); border-radius:14px; padding:14px; margin-top:10px;}
  .admin-panel h3{font-size:13.5px; margin-bottom:8px;}
  .file-drop{border:1.5px dashed var(--border); border-radius:10px; padding:12px; text-align:center; font-size:12px; color:var(--text-dim);}
  table.admin-players{width:100%; border-collapse:collapse; font-size:12.5px; margin-top:8px;}
  table.admin-players td{padding:7px 4px; border-bottom:1px solid var(--border); vertical-align:middle;}
  table.admin-players .pl-actions{display:flex; gap:4px; flex-wrap:wrap;}
  .rules-box{background:var(--surface-2); border-radius:12px; padding:12px 14px; font-size:12.5px; line-height:1.7; margin-top:8px;}
  .rules-box b{color:var(--accent-2);}
  footer{text-align:center; font-size:10.5px; color:var(--text-dim); margin-top:24px;}
</style>

<body>

<script>
/* ============================================================
   QUINIELA MUNDIAL 2026 — app de una sola página sobre Supabase

/* ---------------- CONFIG (reemplaza con tu proyecto de Supabase) ---------------- */
const SUPABASE_URL = "https://brfjvdhpwrxjnubjchom.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZmp2ZGhwd3J4am51YmpjaG9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTYwNzksImV4cCI6MjA5ODc3MjA3OX0.kuplCJzkv46eWICN9glh_Pr-ttwn7qEzjLBWukWR5tI";
const ADMIN_PASSWORD = "ADMINQUINIELA1";
const LOCK_MINUTES_BEFORE = 10;

const CONFIGURED = !SUPABASE_URL.includes("YOUR-PROJECT") && !SUPABASE_ANON_KEY.includes("YOUR_ANON_KEY");
const sb = (CONFIGURED && window.supabase) ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

/* ---------------- i18n (navegación y vista de jugador) ---------------- */
const I18N = {
  es:{
    title:"Quiniela Mundial 2026", subtitle:"Pronostica y sube a la cima",
    navPred:"Pronósticos", navTable:"Tabla", navProfile:"Mi perfil",
    notConfigured:"⚠️ Esta app aún no está conectada a una base de datos. Reemplaza SUPABASE_URL y SUPABASE_ANON_KEY al inicio del script con los de tu proyecto de Supabase (ver supabase-schema.sql).",
    nextUp:"Próximos a pronosticar", pastPhases:"Fases y jornadas anteriores",
    ninety:"90 minutos", etime:"Tiempo extra (120')", pens:"Penales",
    confirmBtn:"Confirmar pronóstico", editBtn:"Modificar marcador", lockedBadge:"Cerrado", openBadge:"Abierto",
    confirmedBadge:"Confirmado", finishedBadge:"Finalizado",
    yourName:"Tu nombre", namePlaceholder:"Escribe tu nombre...", enter:"Entrar", logout:"Cerrar sesión",
    hello:n=>`Hola, ${n} 👋`, notLoggedIn:"Entra con tu nombre para pronosticar y aparecer en la tabla.",
    leaderboard:"Tabla de posiciones", filterAll:"General (todos los partidos)",
    copyTable:"Copiar tabla", shareWhats:"Enviar por WhatsApp", copied:"¡Copiado!",
    noPlayers:"Nadie ha pronosticado todavía.",
    adminSectionTitle:"Contraseña de administrador", adminPlaceholder:"Contraseña", adminEnter:"Entrar",
    adminWrong:"Contraseña incorrecta.", adminOk:"Modo administrador activado.", adminExit:"Salir del modo admin",
    rulesTitle:"¿Cómo se puntúa?",
    save:"Guardar", errGeneric:"Algo falló. Intenta de nuevo.",
    loading:"Cargando..."
  }
};
let lang = "es";
function t(key, ...args){ const v = I18N[lang][key]; return typeof v === "function" ? v(...args) : v; }

/* ---------------- estado ---------------- */
let theme = localStorage.getItem("q26_theme") || ((window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark");
let activeTab = "pronosticos";
let me = safeParse(localStorage.getItem("q26_me"));
let adminUnlocked = localStorage.getItem("q26_admin") === "1";
let adminPasswordDraft = "";

let tournaments = [], pools = [], crests = {}, matches = [], players = [], allPredictions = [];
let myPredictions = {};
let draftPreds = {};
let editingMatches = new Set();
let openAccordions = new Set();
let boardFilter = "ALL";
let loadingBoard = true;
let toast = null;
let nameFieldDraft = "";
let adminOpenSections = new Set();

function safeParse(s){ try{ return s ? JSON.parse(s) : null; }catch(e){ return null; } }

/* ---------------- helpers ---------------- */
function slugify(name){
  return name.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"") || "jugador";
}
function escapeHTML(s){ const d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }
function numOrNull(v){ if(v===undefined||v===null||v==="") return null; const n = Number(v); return isNaN(n) ? null : n; }
function fmtDate(iso){
  try{ const d = new Date(iso); return d.toLocaleString("es-MX", {day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit"}); }
  catch(e){ return iso; }
}
function downloadFile(filename, content, mime){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  a.remove(); URL.revokeObjectURL(url);
}
function showToast(type, text){ toast = {type, text}; render(); }

/* ---------------- supabase helpers ---------------- */
async function sbSelect(table){
  if(!sb) return [];
  try{ const { data, error } = await sb.from(table).select("*"); if(error){ console.error(error); return []; } return data || []; }
  catch(e){ console.error(e); return []; }
}
async function sbUpsert(table, payload, opts){
  if(!sb) return null;
  try{
    const { data, error } = await sb.from(table).upsert(payload, opts || {}).select();
    if(error){ console.error(error); showToast("err", error.message); return null; }
    return data;
  }catch(e){ console.error(e); showToast("err", t("errGeneric")); return null; }
}
async function sbDelete(table, id){
  if(!sb) return false;
  try{ const { error } = await sb.from(table).delete().eq("id", id); if(error){ console.error(error); return false; } return true; }
  catch(e){ console.error(e); return false; }
}
async function sbUpdate(table, id, patch){
  if(!sb) return false;
  try{ const { error } = await sb.from(table).update(patch).eq("id", id); if(error){ console.error(error); showToast("err", error.message); return false; } return true; }
  catch(e){ console.error(e); return false; }
}

/* ---------------- carga de datos ---------------- */
async function loadAll(){
  loadingBoard = true; render();
  const [tRes, pRes, cRes, mRes, plRes, prRes] = await Promise.all([
    sbSelect("tournaments"), sbSelect("pools"), sbSelect("team_crests"),
    sbSelect("matches"), sbSelect("players"), sbSelect("predictions")
  ]);
  tournaments = tRes; pools = pRes;
  crests = {}; cRes.forEach(c => crests[c.team_name] = c.crest_url);
  matches = mRes.slice().sort((a,b) => new Date(a.kickoff) - new Date(b.kickoff));
  players = plRes; allPredictions = prRes;
  if(me){
    myPredictions = {};
    allPredictions.filter(p => p.player_id === me.id).forEach(p => myPredictions[p.match_id] = p);
    matches.forEach(m => { if(!draftPreds[m.id]) draftPreds[m.id] = predToDraft(myPredictions[m.id]); });
  }
  loadingBoard = false;
  render();
}
function predToDraft(p){
  return {
    pred90_a: p && p.pred90_a != null ? String(p.pred90_a) : "",
    pred90_b: p && p.pred90_b != null ? String(p.pred90_b) : "",
    pred120_a: p && p.pred120_a != null ? String(p.pred120_a) : "",
    pred120_b: p && p.pred120_b != null ? String(p.pred120_b) : "",
    pred_pen_a: p && p.pred_pen_a != null ? String(p.pred_pen_a) : "",
    pred_pen_b: p && p.pred_pen_b != null ? String(p.pred_pen_b) : ""
  };
}

/* ---------------- jugador / perfil ---------------- */
async function ensurePlayer(name){
  const slug = slugify(name);
  const existing = players.find(p => p.slug === slug);
  if(existing) return existing;
  const rows = await sbUpsert("players", {name: name.trim(), slug}, {onConflict:"slug"});
  if(rows && rows[0]){ players.push(rows[0]); return rows[0]; }
  return null;
}
async function loginAsPlayer(){
  const name = nameFieldDraft.trim();
  if(!name){ showToast("err", "Escribe tu nombre."); return; }
  const p = await ensurePlayer(name);
  if(!p){ showToast("err", t("errGeneric")); return; }
  me = {id:p.id, name:p.name, slug:p.slug};
  localStorage.setItem("q26_me", JSON.stringify(me));
  await loadAll();
}
function logout(){ me = null; localStorage.removeItem("q26_me"); myPredictions = {}; render(); }

/* ---------------- motor de puntaje ---------------- */
function scorePhase(pa, pb, ra, rb){
  if(ra == null || rb == null) return null;
  if(pa == null || pb == null) return {pts:0, diff:0};
  const predW = pa > pb ? "A" : pa < pb ? "B" : "D";
  const realW = ra > rb ? "A" : ra < rb ? "B" : "D";
  const exact = pa === ra && pb === rb;
  const oneHit = (pa === ra || pb === rb);
  let pts;
  if(exact) pts = 5;
  else if(predW === realW && oneHit) pts = 4;
  else if(predW === realW) pts = 3;
  else if(oneHit) pts = 1;
  else pts = 0;
  return {pts, diff:(pa+pb)-(ra+rb)};
}
function scoreMatch(match, pred){
  const phases = [];
  const s90 = scorePhase(pred && pred.pred90_a, pred && pred.pred90_b, match.score90_a, match.score90_b);
  if(s90) phases.push(s90);
  const s120 = scorePhase(pred && pred.pred120_a, pred && pred.pred120_b, match.score120_a, match.score120_b);
  if(s120) phases.push(s120);
  const spen = scorePhase(pred && pred.pred_pen_a, pred && pred.pred_pen_b, match.pen_a, match.pen_b);
  if(spen) phases.push(spen);
  return { pts: phases.reduce((s,p) => s + p.pts, 0), diff: phases.reduce((s,p) => s + p.diff, 0) };
}
function computeLeaderboard(matchList){
  const ids = new Set(matchList.map(m => m.id));
  const byPlayer = {};
  players.filter(p => !p.blocked).forEach(p => byPlayer[p.id] = {id:p.id, name:p.name, pts:0, diff:0});
  allPredictions.forEach(pred => {
    if(!ids.has(pred.match_id) || !byPlayer[pred.player_id]) return;
    const match = matches.find(m => m.id === pred.match_id);
    if(!match) return;
    const r = scoreMatch(match, pred);
    byPlayer[pred.player_id].pts += r.pts;
    byPlayer[pred.player_id].diff += r.diff;
  });
  const rows = Object.values(byPlayer);
  rows.sort((a,b) => b.pts - a.pts || Math.abs(a.diff) - Math.abs(b.diff) || a.name.localeCompare(b.name));
  return rows;
}

/* ---------------- bloqueo por horario ---------------- */
function isLocked(match){ return Date.now() >= new Date(match.kickoff).getTime() - LOCK_MINUTES_BEFORE * 60000; }

/* ---------------- acciones de pronóstico ---------------- */
function setDraft(matchId, field, val){
  val = val.replace(/[^0-9]/g,"").slice(0,2);
  if(!draftPreds[matchId]) draftPreds[matchId] = predToDraft(null);
  draftPreds[matchId][field] = val;
  render();
}
function toggleEditMatch(matchId){
  if(editingMatches.has(matchId)) editingMatches.delete(matchId); else editingMatches.add(matchId);
  render();
}
async function confirmPrediction(matchId){
  if(!me){ showToast("err", t("notLoggedIn")); return; }
  const d = draftPreds[matchId] || predToDraft(null);
  const payload = {
    player_id: me.id, match_id: matchId,
    pred90_a: numOrNull(d.pred90_a), pred90_b: numOrNull(d.pred90_b),
    pred120_a: numOrNull(d.pred120_a), pred120_b: numOrNull(d.pred120_b),
    pred_pen_a: numOrNull(d.pred_pen_a), pred_pen_b: numOrNull(d.pred_pen_b),
    confirmed: true
  };
  if(payload.pred90_a == null || payload.pred90_b == null){ showToast("err", "Pon al menos el marcador de los 90 minutos."); return; }
  const rows = await sbUpsert("predictions", payload, {onConflict:"player_id,match_id"});
  if(rows && rows[0]){
    myPredictions[matchId] = rows[0];
    allPredictions = allPredictions.filter(p => !(p.player_id===me.id && p.match_id===matchId));
    allPredictions.push(rows[0]);
    editingMatches.delete(matchId);
    showToast("ok", "Pronóstico confirmado.");
  }
}

/* ---------------- CSV: partidos ---------------- */
function parseCSVFile(file){
  return new Promise((resolve,reject) => { Papa.parse(file, {header:true, skipEmptyLines:true, complete:r => resolve(r.data), error:reject}); });
}
async function importMatchesCSV(file){
  if(!sb){ showToast("err", "Configura Supabase primero."); return; }
  let rows;
  try{ rows = await parseCSVFile(file); }catch(e){ showToast("err","No se pudo leer el CSV."); return; }
  const csvTournamentIds = new Set(rows.map(r => r.tournament_id).filter(Boolean));
  const existingT = await sbSelect("tournaments");
  const toDelete = existingT.filter(tt => !csvTournamentIds.has(tt.id));
  const toCreate = [...csvTournamentIds].filter(id => !existingT.find(tt => tt.id === id));

  if(toDelete.length){
    const ok = window.confirm("Se eliminarán estos torneos porque ya no aparecen en el CSV (y sus partidos/pronósticos):\n" +
      toDelete.map(tt => tt.name).join(", ") + "\n\n¿Continuar?");
    if(!ok) return;
    for(const tt of toDelete) await sbDelete("tournaments", tt.id);
  }
  for(const id of toCreate){
    const row = rows.find(r => r.tournament_id === id);
    await sbUpsert("tournaments", {id, name: row.tournament_name || id, active:true}, {onConflict:"id"});
  }
  const seenPools = new Set();
  for(const r of rows){
    if(!r.pool_id || seenPools.has(r.pool_id)) continue;
    seenPools.add(r.pool_id);
    await sbUpsert("pools", {id:r.pool_id, tournament_id:r.tournament_id, name:r.pool_name || r.pool_id}, {onConflict:"id"});
  }
  let count = 0;
  for(const r of rows){
    if(!r.match_id) continue;
    const payload = {
      id:r.match_id, tournament_id:r.tournament_id, pool_id:r.pool_id || null,
      phase:r.phase, matchday:r.matchday || null, team_a:r.team_a, team_b:r.team_b,
      kickoff:r.kickoff_utc, venue:r.venue || null,
      is_knockout:String(r.is_knockout).toUpperCase()==="TRUE",
      score90_a:numOrNull(r.score90_a), score90_b:numOrNull(r.score90_b),
      score120_a:numOrNull(r.score120_a), score120_b:numOrNull(r.score120_b),
      pen_a:numOrNull(r.pen_a), pen_b:numOrNull(r.pen_b),
      status:r.status || "scheduled"
    };
    await sbUpsert("matches", payload, {onConflict:"id"});
    count++;
  }
  showToast("ok", `CSV importado: ${count} partidos procesados.`);
  await loadAll();
}

/* ---------------- CSV: pronósticos masivos ---------------- */
async function importPredictionsCSV(file){
  if(!sb){ showToast("err", "Configura Supabase primero."); return; }
  let rows;
  try{ rows = await parseCSVFile(file); }catch(e){ showToast("err","No se pudo leer el CSV."); return; }
  let count = 0;
  for(const r of rows){
    if(!r.player_name || !r.match_id) continue;
    const player = await ensurePlayer(r.player_name);

    const payload = {
      player_id:player.id, match_id:r.match_id,
      pred90_a:numOrNull(r.pred90_a), pred90_b:numOrNull(r.pred90_b),
      pred120_a:numOrNull(r.pred120_a), pred120_b:numOrNull(r.pred120_b),
      pred_pen_a:numOrNull(r.pred_pen_a), pred_pen_b:numOrNull(r.pred_pen_b),
      confirmed:true
    };
    await sbUpsert("predictions", payload, {onConflict:"player_id,match_id"});
    count++;
  }
  showToast("ok", `Pronósticos importados: ${count} filas.`);
  await loadAll();
}

/* ---------------- utilidades de agrupación ---------------- */
function groupByPhase(list){
  const order = [], groups = {};
  list.forEach(m => { if(!groups[m.phase]){ groups[m.phase] = []; order.push(m.phase); } groups[m.phase].push(m); });
  return order.map(phase => ({phase, items:groups[phase]}));
}
function distinctTeams(){
  const s = new Set();
  matches.forEach(m => { s.add(m.team_a); s.add(m.team_b); });
  return [...s].sort();
}

function toggleAccordion(key){

function captureFocus(){
  const a = document.activeElement;
  if(!a || (a.tagName !== "INPUT" && a.tagName !== "SELECT")) return null;
  return {id:a.id || null, selStart:a.selectionStart, selEnd:a.selectionEnd};
}
function restoreFocus(info){
  if(!info || !info.id) return;
  const el = document.getElementById(info.id);
  if(el){ el.focus(); try{ el.setSelectionRange(info.selStart, info.selEnd); }catch(e){} }
}

function matchPredictionCardHTML(m){
  const pred = myPredictions[m.id];
  const draft = draftPreds[m.id] || predToDraft(pred);
  const locked = isLocked(m);
  const confirmed = !!(pred && pred.confirmed);
  const editing = editingMatches.has(m.id);
  const editable = !locked && (!confirmed || editing);

  let statusBadge;
  if(locked) statusBadge = `<span class="badge locked">🔒 ${t("lockedBadge")}</span>`;
  else if(confirmed && !editing) statusBadge = `<span class="badge confirmed">✅ ${t("confirmedBadge")}</span>`;
  else statusBadge = `<span class="badge open">${t("openBadge")}</span>`;

  const ninety = scorePairHTML(m.id, "pred90", t("ninety"), draft.pred90_a, draft.pred90_b, !editable);
  const et = m.is_knockout ? scorePairHTML(m.id, "pred120", t("etime"), draft.pred120_a, draft.pred120_b, !editable) : "";
  const pen = m.is_knockout ? scorePairHTML(m.id, "pred_pen", t("pens"), draft.pred_pen_a, draft.pred_pen_b, !editable) : "";

  let actionBtn = "";
  if(!locked){
    if(editable) actionBtn = `<button class="btn-primary" data-action="confirm-pred" data-match="${m.id}">${t("confirmBtn")}</button>`;
    else actionBtn = `<button class="btn-secondary btn-block" style="margin-top:10px;" data-action="edit-pred" data-match="${m.id}">${t("editBtn")}</button>`;
  }

  const resultLine = (m.score90_a != null) ? `<div class="badge finished">${t("finishedBadge")}: ${m.score90_a}-${m.score90_b}${m.score120_a!=null?` (${m.score120_a}-${m.score120_b} t.e.)`:""}${m.pen_a!=null?` · pen ${m.pen_a}-${m.pen_b}`:""}</div>` : "";

  return `
  <div class="match-card">
    <div class="match-top">
      <div class="team">${crestOrBall(m.team_a)}<div class="name">${escapeHTML(m.team_a)}</div></div>
      <div class="vs-box">VS</div>

    </div>
    <div class="match-meta">${escapeHTML(m.phase)}${m.matchday?" · "+escapeHTML(m.matchday):""} · ${fmtDate(m.kickoff)}<br>${statusBadge} ${resultLine}</div>
    ${ninety}${et}${pen}
    ${actionBtn}
  </div>`;
}

    <div class="row">
      <input type="text" id="crestTeamName" list="teamList" placeholder="Nombre exacto del equipo">
      <input type="file" id="crestFile" accept="image/png">
    </div>
    <button class="btn-secondary btn-block" style="margin-top:8px;" data-action="upload-crest">Subir escudo</button>
    <p class="hint">El nombre debe coincidir EXACTO con team_a/team_b del CSV. Actuales: ${Object.keys(crests).length} escudos cargados.</p>
  `;
}

function adminLogoHTML(){
  if(tournaments.length === 0) return `<p class="empty-note">Carga primero un torneo vía CSV.</p>`;
  return `
    <select id="logoTournamentSel">${tournaments.map(tt => `<option value="${tt.id}">${escapeHTML(tt.name)}</option>`).join("")}</select>
    <input type="file" id="logoFile" accept="image/png" style="margin-top:8px;">
    <button class="btn-secondary btn-block" style="margin-top:8px;" data-action="upload-logo">Subir logo</button>
  `;
}

function adminPoolHTML(){
  if(tournaments.length === 0) return `<p class="empty-note">Carga primero un torneo vía CSV.</p>`;
  return `
    <select id="poolTournamentSel">${tournaments.map(tt => `<option value="${tt.id}">${escapeHTML(tt.name)}</option>`).join("")}</select>
    <input type="text" id="poolNameInput" placeholder="Nombre de la quiniela combinada (ej. Eliminación directa)" style="margin-top:8px;">
    <div style="margin-top:8px; max-height:220px; overflow:auto; border:1px solid var(--border); border-radius:10px; padding:8px;">
      ${matches.map(m => `
        <label style="display:flex; gap:8px; align-items:center; padding:5px 0; font-size:12.5px;">
          <input type="checkbox" class="pool-match-check" data-match="${m.id}">
          ${escapeHTML(m.phase)} — ${escapeHTML(m.team_a)} vs ${escapeHTML(m.team_b)}
        </label>`).join("")}
    </div>
    <button class="btn-secondary btn-block" style="margin-top:8px;" data-action="create-pool">Crear quiniela combinada</button>
  `;
}

function renderAdminPanel(){
  return `
  <div class="admin-panel">
    <div class="row" style="justify-content:space-between;">
      <h3 style="margin:0;">⚙️ Panel de administrador</h3>
      <button class="btn-secondary" data-action="admin-logout">${t("adminExit")}</button>
    </div>
    ${adminSectionWrap("csv-matches","📄 Cargar CSV de partidos", `
      <input type="file" id="matchesCsvFile" accept=".csv">
      <button class="btn-secondary btn-block" style="margin-top:8px;" data-action="import-matches-csv">Importar partidos</button>
      <p class="hint">Formato: match_id, tournament_id, tournament_name, pool_id, pool_name, phase, matchday, team_a, team_b, kickoff_utc, venue, is_knockout, score90_a, score90_b, score120_a, score120_b, pen_a, pen_b, status</p>
    `)}
    ${adminSectionWrap("csv-preds","📄 Cargar CSV de pronósticos", `
      <input type="file" id="predsCsvFile" accept=".csv">
      <button class="btn-secondary btn-block" style="margin-top:8px;" data-action="import-preds-csv">Importar pronósticos</button>
      <p class="hint">Formato: player_name, match_id, pred90_a, pred90_b, pred120_a, pred120_b, pred_pen_a, pred_pen_b</p>
    `)}
    ${adminSectionWrap("manual-scores","✍️ Marcador manual por partido", adminManualScoreHTML())}
    ${adminSectionWrap("pending","⏱ Partidos pendientes de resultado", adminPendingResultsHTML())}
    ${adminSectionWrap("crests","🛡️ Escudos de selecciones/clubes", adminCrestsHTML())}
    ${adminSectionWrap("logo","🖼️ Logo del torneo", adminLogoHTML())}
    ${adminSectionWrap("players","👥 Jugadores", adminPlayersTableHTML())}
    ${adminSectionWrap("pools","🧩 Quiniela combinada (varias fases)", adminPoolHTML())}
    ${adminSectionWrap("export","⬇️ Exportar toda la información", `<button class="btn-secondary btn-block" data-action="export-all">Descargar JSON con todo</button>`)}
  </div>`;
}

function renderPerfilTab(){
  return `
  <div class="card">
    <h2><span class="dot"></span>${t("yourName")}</h2>
    ${me ? `
      <p>${t("hello", escapeHTML(me.name))}</p>
      <button class="btn-secondary" data-action="logout">${t("logout")}</button>
    ` : `
      <div class="row">
        <input type="text" id="profileNameInput" placeholder="${t('namePlaceholder')}" value="${escapeHTML(nameFieldDraft)}">
        <button class="btn-primary" style="margin-top:0; flex:0 0 auto;" data-action="login">${t("enter")}</button>
      </div>
    `}
  </div>

  <div class="card">
    <h2><span class="dot"></span>${t("rulesTitle")}</h2>
    ${rulesBoxHTML()}
  </div>

  <div class="card">
    ${adminGateHTML()}
    ${adminUnlocked ? renderAdminPanel() : ""}
  </div>
  `;
}

function render(){
  document.documentElement.setAttribute("data-theme", theme);
  const app = document.getElementById("app");
  const focusInfo = captureFocus();

  const body = activeTab === "pronosticos" ? renderPronosticosTab()
             : activeTab === "tabla" ? renderTablaTab()
             : renderPerfilTab();

  app.innerHTML = `
    <header class="top">
      <div class="brand">${logoSVG()}<div><h1>${t("title")}</h1><small>${t("subtitle")}</small></div></div>
      <div class="top-actions">
        <button class="icon-btn" data-action="theme">${theme==='dark'?'🌙':'☀️'}</button>
      </div>
    </header>

    ${!CONFIGURED ? `<div class="banner">${t("notConfigured")}</div>` : ""}
    ${toast ? `<div class="toast ${toast.type}"><span>${escapeHTML(toast.text)}</span><button data-action="dismiss-toast">✕</button></div>` : ""}

    <nav class="tab-nav">
      <button class="${activeTab==='pronosticos'?'active':''}" data-action="tab" data-tab="pronosticos">${t("navPred")}</button>
      <button class="${activeTab==='tabla'?'active':''}" data-action="tab" data-tab="tabla">${t("navTable")}</button>
      <button class="${activeTab==='perfil'?'active':''}" data-action="tab" data-tab="perfil">${t("navProfile")}</button>
    </nav>

    ${body}
    <footer>Quiniela Mundial 2026</footer>
  `;
  attachHandlers();
  restoreFocus(focusInfo);
}

/* ---------------- eventos ---------------- */
function attachHandlers(){
  const app = document.getElementById("app");

  const nameEl = document.getElementById("profileNameInput");
  if(nameEl) nameEl.addEventListener("input", e => { nameFieldDraft = e.target.value; });

  const passEl = document.getElementById("adminPassInput");
  if(passEl) passEl.addEventListener("input", e => { adminPasswordDraft = e.target.value; });

  app.querySelectorAll("[data-action]").forEach(el => {
    const a = el.dataset.action;
    if(a === "tab") el.addEventListener("click", () => { activeTab = el.dataset.tab; render(); });
    else if(a === "theme") el.addEventListener("click", () => { theme = theme==="dark"?"light":"dark"; localStorage.setItem("q26_theme",theme); render(); });
    else if(a === "dismiss-toast") el.addEventListener("click", () => { toast = null; render(); });
    else if(a === "draft") el.addEventListener("input", () => setDraft(el.dataset.match, el.dataset.field, el.value));
    else if(a === "confirm-pred") el.addEventListener("click", () => confirmPrediction(el.dataset.match));
    else if(a === "edit-pred") el.addEventListener("click", () => toggleEditMatch(el.dataset.match));
    else if(a === "toggle-acc") el.addEventListener("click", () => toggleAccordion(el.dataset.key));
    else if(a === "board-filter") el.addEventListener("change", () => { boardFilter = el.value; render(); });
    else if(a === "copy-board") el.addEventListener("click", () => copyLeaderboard(computeLeaderboard(filteredMatchesForBoard()), t("leaderboard")));
    else if(a === "share-board") el.addEventListener("click", () => shareWhatsApp(computeLeaderboard(filteredMatchesForBoard()), t("leaderboard")));
    else if(a === "login") el.addEventListener("click", loginAsPlayer);
    else if(a === "logout") el.addEventListener("click", logout);
    else if(a === "admin-login") el.addEventListener("click", () => {
      if(adminPasswordDraft === ADMIN_PASSWORD){
        adminUnlocked = true; localStorage.setItem("q26_admin","1"); adminPasswordDraft = "";
        showToast("ok", t("adminOk"));
      } else { showToast("err", t("adminWrong")); }
    });
    else if(a === "admin-logout") el.addEventListener("click", () => { adminUnlocked=false; localStorage.removeItem("q26_admin"); render(); });
    else if(a === "toggle-admin-sec") el.addEventListener("click", () => {
      const k = el.dataset.key;
      if(adminOpenSections.has(k)) adminOpenSections.delete(k); else adminOpenSections.add(k);
      render();
    });
    else if(a === "import-matches-csv") el.addEventListener("click", () => {
      const f = document.getElementById("matchesCsvFile").files[0];
      if(!f){ showToast("err","Elige un archivo CSV."); return; }
      importMatchesCSV(f);
    });
    else if(a === "import-preds-csv") el.addEventListener("click", () => {
      const f = document.getElementById("predsCsvFile").files[0];
      if(!f){ showToast("err","Elige un archivo CSV."); return; }
      importPredictionsCSV(f);
    });
    else if(a === "save-match-score") el.addEventListener("click", () => saveMatchScore(el.dataset.match));
    else if(a === "upload-crest") el.addEventListener("click", () => {
      const name = document.getElementById("crestTeamName").value.trim();
      const file = document.getElementById("crestFile").files[0];
      if(!name || !file){ showToast("err","Escribe el nombre del equipo y elige un PNG."); return; }
      uploadCrest(name, file);
    });
    else if(a === "upload-logo") el.addEventListener("click", () => {
      const tid = document.getElementById("logoTournamentSel").value;
      const file = document.getElementById("logoFile").files[0];
      if(!file){ showToast("err","Elige un PNG."); return; }
      uploadTournamentLogo(tid, file);
    });
    else if(a === "rename-player") el.addEventListener("click", () => renamePlayerPrompt(el.dataset.id, el.dataset.name));
    else if(a === "toggle-block") el.addEventListener("click", () => toggleBlockPlayer(el.dataset.id, el.dataset.blocked !== "true"));
    else if(a === "create-pool") el.addEventListener("click", () => {
      const tid = document.getElementById("poolTournamentSel").value;
      const name = document.getElementById("poolNameInput").value;
      const ids = [...app.querySelectorAll(".pool-match-check:checked")].map(c => c.dataset.match);
      createPool(tid, name, ids);
    });
    else if(a === "export-all") el.addEventListener("click", exportAllData);
  });
}

/* ---------------- init ---------------- */
async function init(){
  render();
  await loadAll();
  setInterval(loadAll, 20000);
}
init();
</script>
</body>
</html>
